    # 主API代理 (5000端口)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
	proxy_connect_timeout 120s;
       proxy_send_timeout 120s;
       proxy_read_timeout 120s;
       send_timeout 120s;
    }

    # Socket.IO (WebSocket) → Node on 5000
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Salon gateway (Voice-clone salon_gateway on 127.0.0.1:8765)
    # 对外: https://quizmesh.tech/salon/health
    #       https://quizmesh.tech/salon/webhook/wecom
    #       https://quizmesh.tech/salon/internal/booking
    #       https://quizmesh.tech/salon/simulate/wecom-text  (dev only; SALON_SIMULATE_TOKEN)
    # proxy_pass 末尾 / 会去掉 /salon/ 前缀，后端路由仍为 /health、/webhook/wecom 等
    location = /salon {
        return 301 https://$host/salon/;
    }

    location /salon/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward auth headers for /internal/booking (Dify HTTP node → gateway)
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Salon-Token $http_x_salon_token;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

