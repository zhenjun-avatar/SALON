# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name quizmesh.tech www.quizmesh.tech;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    server_name quizmesh.tech www.quizmesh.tech;
    client_max_body_size 10m;   # 或者你希望的其他大小

    root /home/ecs-user/mmesh.v3.0/client/build;
    index index.html;

    # P2: 启用 gzip（压缩文本类静态资源与代理响应）
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/xml
        text/xml
        image/svg+xml;

    ssl_certificate /etc/letsencrypt/live/quizmesh.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quizmesh.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 添加安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # ✅ CSP 配置：允许表单提交到支付宝网关
    # 注意：form-action 指令只指定域名即可，会自动允许该域名下的所有路径
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:; object-src 'none'; form-action 'self' https://openapi.alipay.com https://*.alipay.com https://*.alipayobjects.com; frame-src 'self' https://openapi.alipay.com https://*.alipay.com; child-src 'self' https://openapi.alipay.com https://*.alipay.com;" always;

# Wiki API路由 - 最高优先级
