    # ✅ Nginx 直接提供 uploads 静态文件（^~ 阻止正则匹配，优先级最高）
    location ^~ /uploads/ {
        alias /home/ecs-user/mmesh.v3.0/server/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 动态页面 SEO 注入 - 代理到 Express
    # 匹配 /quiz/:id 路径（保留特定规则以确保优先级）
    location ~ ^/quiz/[^/]+$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源由 Nginx 直接提供（P1）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|map|json)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # /quizzes 已废弃：301 到 playground
    location ~ ^/quizzes(/.*)?$ {
        return 301 https://quizmesh.tech/playground;
    }

    # 前端路由：优先静态文件，不存在则回退到 SPA 入口
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /sitemap.xml {
        root /home/ecs-user/mmesh.v3.0/client/build;
    }
}

