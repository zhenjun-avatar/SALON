# Dify DSL — Salon Chatflow v5
#
# 核心变化（v5）：两步式发型效果图
# ─────────────────────────────────
# v4 只要有图就立刻生成效果图；v5 改为：
#   Turn 1：用户上传照片 → LLM 给出编号方案（方案一/二/三），询问「您想看哪个方案的效果图？」
#   Turn 2：用户确认（如"方案二"/"就第一个"） → 严格按该方案生成效果图
#
# 图片跨轮存储：由后端 HairstyleSessionStore 负责（按 conversation_id 缓存 1 小时）。
#   Turn 1：Dify 传入 image_url → 网关自动存入 session
#   Turn 2：Dify 传入 image_url=""（用户未再上传图）→ 网关从 session 取出上一轮的图片
#   因此 DSL 无需 Dify 会话变量，导入兼容性更好。
#
# 流程：
#   Start → LLM(Vision) → Code(提取当前图片URL) → Extractor(预约参数+confirmed_style)
#         → 提交预约
#         → IF-ELSE: confirmed_style 非空?
#              ├─ YES → HTTP(hairstyle-preview，image_url 可为空，网关从 session 补全)
#              │         → Code(解析JSON) → Answer(文字 + 效果图链接)
#              └─ NO  → Answer(文字)
#
# 导入后必做：
# 1) 「LLM」节点选 Vision 模型（如 qwen-vl-plus）。
# 2) 「提取预约参数」节点选支持 function-calling 的模型（需识别确认意图）。
# 3) 「提交预约」和「生成效果图」HTTP 节点 → Bearer → 填 SALON_INTERNAL_BOOKING_TOKEN。
# 4) 「生成效果图」HTTP 节点 → 超时设置 → read timeout 改为 90s。
# 5) 若网关不在默认域名，改 URL。
# 6) 发布。

app:
  description: Salon WeCom gateway v5 — two-step hairstyle preview
  icon: 💇
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: Salon 预约客服 v5
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      image:
        enabled: true
        number_limits: 3
        transfer_methods:
          - remote_url
          - local_file
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
      - id: start-llm
        source: node_start
        sourceHandle: source
        target: node_llm
        targetHandle: target
      - id: llm-code-extract
        source: node_llm
        sourceHandle: source
        target: node_code_extract
        targetHandle: target
      - id: code-extract-extractor
        source: node_code_extract
        sourceHandle: source
        target: node_extractor
        targetHandle: target
      - id: extractor-booking
        source: node_extractor
        sourceHandle: source
        target: node_http_booking
        targetHandle: target
      - id: booking-ifelse
        source: node_http_booking
        sourceHandle: source
        target: node_ifelse_confirmed
        targetHandle: target
      - id: ifelse-hairstyle
        source: node_ifelse_confirmed
        sourceHandle: confirmed
        target: node_http_hairstyle
        targetHandle: target
      - id: hairstyle-parse
        source: node_http_hairstyle
        sourceHandle: source
        target: node_code_parse_preview
        targetHandle: target
      - id: parse-answer-img
        source: node_code_parse_preview
        sourceHandle: source
        target: node_answer_img
        targetHandle: target
      - id: ifelse-answer-text
        source: node_ifelse_confirmed
        sourceHandle: 'false'
        target: node_answer_text
        targetHandle: target

    nodes:
      # ── Start ────────────────────────────────────────────────────────
      - data:
          desc: ''
          title: Start
          type: start
          variables: []
        id: node_start
        position:
          x: 80
          y: 300
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── LLM（Vision）────────────────────────────────────────────────
      - data:
          context:
            enabled: false
            variable_selector: []
          desc: ''
          memory:
            query_prompt_template: '{{#sys.query#}}\n\n{{#sys.files#}}'
            window:
              enabled: true
              size: 20
          model:
            completion_params:
              temperature: 0.5
            mode: chat
            name: ''
            provider: ''
          prompt_template:
            - role: system
              selected: true
              text: |-
                你是美发沙龙线上客服。用简短、友好的中文回复用户。
                若用户想预约，引导收集：联系电话、门店、服务项目、意向时间。
                不要回复「我是 AI 无法预约」。
                当你判断已收集到电话+门店+时间时，在回复中告知用户"预约已提交，等待确认"。

                【发型效果图——两步式，请严格遵守】

                第一步：用户上传本人照片后，分析发质、脸型、当前发色，
                给出编号方案，每条格式：
                  方案X：[发型名称]，[具体发色描述（用通俗色名，如「奶茶棕」「冷灰紫」）]，[造型细节（如刘海、发尾处理）]，[适合理由]
                示例：方案一：锁骨波浪卷，奶茶栗棕色，前额八字刘海+发尾微卷，适合圆脸显瘦
                最后询问：「您想看哪个方案的效果图呢？」
                ⚠ 本轮只给文字方案，不说"正在生成图片"。
                ⚠ 发色描述用通俗中文名（如「冷棕色」「蜂蜜金」），避免仅写色号（如「#8C4E2D」），色号可补充在括号内。

                第二步：用户确认选择后（如"方案一"、"就第二个"、"帮我做栗色那个"），
                回复：「好的！正在为您按照[方案完整描述]生成效果图，请稍候约10秒……」
                ⚠ 不要再列出所有方案，只确认用户选的那个。
            - role: user
              selected: true
              text: "{{#sys.query#}}\n{{#sys.files#}}"
          title: LLM
          type: llm
          variables: []
          vision:
            enabled: true
        id: node_llm
        position:
          x: 300
          y: 300
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── Code：提取当前轮图片 URL ─────────────────────────────────────
      - data:
          code: |
            def main(files: list) -> dict:
                for f in (files or []):
                    url = (f or {}).get("url") or (f or {}).get("remote_url") or ""
                    if url:
                        return {"image_url": url}
                return {"image_url": ""}
          code_language: python3
          desc: 从 sys.files 提取当前轮首张图片 URL（无图时返回空字符串，网关从 session 补全）
          outputs:
            image_url:
              description: 当前轮图片 URL，无图时为空字符串
              type: string
          title: 提取当前图片URL
          type: code
          variables:
            - label: files
              value_selector:
                - sys
                - files
              variable: files
        id: node_code_extract
        position:
          x: 520
          y: 300
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── Parameter Extractor ──────────────────────────────────────────
      - data:
          desc: 提取预约字段；结合对话历史识别用户确认的发型方案（confirmed_style）
          instruction: |-
            从当前用户输入和最近对话历史中提取以下字段：

            【预约字段】（仅从当前消息提取，未出现返回空字符串）：
            phone、store、slot_text、service、color_summary

            【confirmed_style】（结合对话历史判断）：
            - 若用户当前消息明确选择/确认了某个具体发型方案
              （如"就方案一"、"帮我做那个栗色的"、"第二个可以"、"选方案三"），
              从对话历史中找出该方案的完整描述（发型名称+发色+具体细节），填入 confirmed_style。
              示例：「波浪卷发，奶茶栗色渐变 8N→5N，中长发」
            - 若用户是首次上传照片、询问建议、或聊其他话题，confirmed_style 返回空字符串。
            - 只在用户明确表达确认意图时填写，不要猜测。
          memory:
            enabled: true
            window:
              enabled: true
              size: 6
          model:
            completion_params:
              temperature: 0.2
            mode: chat
            name: ''
            provider: ''
          parameters:
            - description: 用户联系手机号（如 18310607536）
              name: phone
              required: false
              type: string
            - description: 门店名称（如 东门店、西门店）
              name: store
              required: false
              type: string
            - description: 预约时间自然语言（如 周五晚上7点、明天下午3点）
              name: slot_text
              required: false
              type: string
            - description: 服务项目（如 染发、烫发、剪发、洗剪吹）
              name: service
              required: false
              type: string
            - description: 发色方案要求（如 黄色、黑色渐变）
              name: color_summary
              required: false
              type: string
            - description: |-
                用户确认的完整发型方案描述（如「波浪卷发，栗色奶茶渐变 8N/5N，中长」）。
                仅在用户明确选择某方案时填写；否则返回空字符串。
              name: confirmed_style
              required: false
              type: string
          query:
            - sys
            - query
          reasoning_mode: prompt
          title: 提取预约参数
          type: parameter-extractor
        id: node_extractor
        position:
          x: 740
          y: 300
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── HTTP：提交预约 ───────────────────────────────────────────────
      - data:
          authorization:
            config:
              api_key: 'REPLACE_WITH_SALON_INTERNAL_BOOKING_TOKEN'
              header: ''
              type: bearer
            type: api-key
          body:
            data:
              - id: json-body-booking
                key: ''
                type: text
                value: '{"channel":"dify","conversation_id":"{{#sys.conversation_id#}}","phone":"{{#node_extractor.phone#}}","store":"{{#node_extractor.store#}}","service":"{{#node_extractor.service#}}","slot_text":"{{#node_extractor.slot_text#}}","color_summary":"{{#node_extractor.color_summary#}}","notes":"{{#node_llm.text#}}","status":"pending","image_url":"{{#node_code_extract.image_url#}}"}'
            type: json
          desc: 每轮都 POST；网关跨轮累积，phone+store+slot_text 首次齐全才写飞书。
          headers: 'Content-Type: application/json'
          method: post
          params: ''
          retry_config:
            max_retries: 2
            retry_enabled: true
            retry_interval: 500
          ssl_verify: true
          timeout:
            max_connect_timeout: 0
            max_read_timeout: 0
            max_write_timeout: 0
          title: 提交预约
          type: http-request
          url: https://quizmesh.tech/salon/internal/booking
          variables: []
        id: node_http_booking
        position:
          x: 960
          y: 300
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── IF-ELSE：用户是否已确认方案 ─────────────────────────────────
      - data:
          cases:
            - case_id: confirmed
              conditions:
                - comparison_operator: not empty
                  variable_selector:
                    - node_extractor
                    - confirmed_style
              logical_operator: and
          desc: confirmed_style 非空则生成效果图；否则只回文字
          title: 已确认方案?
          type: if-else
        id: node_ifelse_confirmed
        position:
          x: 1180
          y: 300
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── HTTP：生成发型效果图（确认分支）─────────────────────────────
      - data:
          authorization:
            config:
              api_key: 'REPLACE_WITH_SALON_INTERNAL_BOOKING_TOKEN'
              header: ''
              type: bearer
            type: api-key
          body:
            data:
              - id: json-body-hairstyle
                key: ''
                type: text
                value: '{"image_url":"{{#node_code_extract.image_url#}}","style_prompt":"{{#node_extractor.confirmed_style#}}","conversation_id":"{{#sys.conversation_id#}}"}'
            type: json
          desc: |-
            严格按 confirmed_style 调用通义万相生成效果图（约 10–30s）。
            image_url 为空时网关从 HairstyleSessionStore 取上一轮图片。
            ⚠ 导入后需手动将 read timeout 改为 90s。
          headers: 'Content-Type: application/json'
          method: post
          params: ''
          retry_config:
            max_retries: 1
            retry_enabled: true
            retry_interval: 1000
          ssl_verify: true
          timeout:
            max_connect_timeout: 10
            max_read_timeout: 90
            max_write_timeout: 30
          title: 生成发型效果图
          type: http-request
          url: https://quizmesh.tech/salon/internal/hairstyle-preview
          variables: []
        id: node_http_hairstyle
        position:
          x: 1400
          y: 100
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── Code：解析效果图 JSON body ───────────────────────────────────
      - data:
          code: |
            import json
            def main(body: str) -> dict:
                try:
                    data = json.loads(body or "{}")
                    url = data.get("preview_url") or ""
                except Exception:
                    url = ""
                return {"preview_url": url}
          code_language: python3
          desc: 解析 /internal/hairstyle-preview 返回的 JSON，提取 preview_url
          outputs:
            preview_url:
              description: 效果图 URL
              type: string
          title: 解析效果图URL
          type: code
          variables:
            - label: body
              value_selector:
                - node_http_hairstyle
                - body
              variable: body
        id: node_code_parse_preview
        position:
          x: 1620
          y: 100
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── Answer：含效果图（确认方案分支）────────────────────────────
      - data:
          answer: "{{#node_llm.text#}}\n\n发型效果预览：{{#node_code_parse_preview.preview_url#}}"
          desc: ''
          title: Answer（含效果图）
          type: answer
          variables: []
        id: node_answer_img
        position:
          x: 1840
          y: 100
        sourcePosition: right
        targetPosition: left
        type: custom

      # ── Answer：纯文字（首次上传照片/普通对话）──────────────────────
      - data:
          answer: '{{#node_llm.text#}}'
          desc: ''
          title: Answer
          type: answer
          variables: []
        id: node_answer_text
        position:
          x: 1400
          y: 500
        sourcePosition: right
        targetPosition: left
        type: custom
